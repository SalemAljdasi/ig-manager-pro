name: Build IG Manager Pro APK
  on:
    push:
      branches: [main, master]
    workflow_dispatch:
  permissions:
    contents: write
    actions: write
  jobs:
    build:
      runs-on: ubuntu-22.04
      timeout-minutes: 90
      steps:
        - name: Checkout code
          uses: actions/checkout@v3
        - name: Set up Python 3.10
          uses: actions/setup-python@v4
          with:
            python-version: "3.10"
        - name: Install system dependencies
          run: |
            sudo apt-get update -qq
            sudo apt-get install -y -qq git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev cmake
            echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        - name: Cache Buildozer
          uses: actions/cache@v3
          with:
            path: ~/.buildozer
            key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
            restore-keys: buildozer-${{ runner.os }}-
        - name: Install Python packages
          run: |
            pip install --upgrade pip
            pip install buildozer cython==0.29.36 kivy==2.3.0 kivymd==1.2.0
        - name: Build APK
          run: buildozer android debug 2>&1 | tee build.log
        - name: Upload APK
          uses: actions/upload-artifact@v3
          with:
            name: IGManagerPro-APK
            path: bin/*.apk
            retention-days: 30
        - name: Upload log on failure
          if: failure()
          uses: actions/upload-artifact@v3
          with:
            name: build-log
            path: build.log
            retention-days: 7
  