name: Build IG Manager Pro APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev cmake

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36
          pip install kivy==2.3.0 kivymd==1.2.0

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug 2>&1 | tee build.log

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find bin/ -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK)" >> $GITHUB_OUTPUT
          ls -lh bin/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IGManagerPro-APK
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ APK Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "**File:** ${{ steps.find_apk.outputs.apk_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** Go to Actions tab → this run → Artifacts section" >> $GITHUB_STEP_SUMMARY
