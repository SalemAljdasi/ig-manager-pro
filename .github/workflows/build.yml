name: Build IG Manager Pro APK

on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - 'requirements.txt'
      - 'assets/**'
      - 'core/**'
      - 'models/**'
      - 'screens/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py310-p4a2309-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-py310-p4a2309-

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-v5-p4a2309-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v5-p4a2309-

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            openjdk-17-jdk \
            build-essential ccache \
            libffi-dev libssl-dev \
            python3-pip python3-setuptools python3-wheel \
            autoconf automake libtool \
            libsqlite3-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libreadline-dev libgdbm-dev libdb5.3-dev \
            libbz2-dev libexpat1-dev liblzma-dev \
            lzma lzma-dev \
            cmake ninja-build pkg-config \
            libltdl-dev patch

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Build Tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install 'cython==0.29.37'
          pip install 'python-for-android==2023.9.16'
          pip install 'buildozer==1.5.0'

      - name: Accept Android SDK Licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | buildozer android update 2>/dev/null || true

      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Verify APK was created
        run: |
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found. Last 200 lines of log:"
            tail -200 buildozer.log
            exit 1
          else
            echo "APK found: $APK"
            ls -lh $APK
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IG-Manager-Pro-v4.0-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log-${{ github.run_number }}
          path: buildozer.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          APK=$(find bin/ -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "APK built! Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "Build failed. Check buildozer-log artifact." >> $GITHUB_STEP_SUMMARY
          fi
