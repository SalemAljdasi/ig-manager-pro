name: Build IG Manager Pro APK

on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - 'requirements.txt'
      - 'assets/**'
      - 'core/**'
      - 'models/**'
      - 'screens/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            build-essential ccache libffi-dev libssl-dev \
            python3-pip python3-setuptools python3-wheel \
            autoconf automake libtool \
            libsqlite3-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libreadline-dev libgdbm-dev libdb5.3-dev \
            libbz2-dev libexpat1-dev liblzma-dev \
            tk-dev libgdbm-compat-dev \
            lzma lzma-dev \
            cmake ninja-build \
            pkg-config

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Python Build Tools
        run: |
          pip install --upgrade pip setuptools wheel cython==0.29.37
          pip install buildozer==1.5.0

      - name: Accept Android SDK Licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | buildozer android update || true

      - name: Build APK with Buildozer
        run: |
          export ANDROIDAPI=33
          export ANDROIDMINAPI=30
          buildozer -v android debug 2>&1 | tee buildozer.log
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find bin/ -name "*.apk" 2>/dev/null | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK found at: $APK_PATH"
          ls -lh bin/ 2>/dev/null || echo "bin/ directory empty"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IG-Manager-Pro-v4.0-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log
          retention-days: 7

      - name: Build Summary
        run: |
          echo "## IG Manager Pro v4.0 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APK=$(find bin/ -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "✅ **APK built successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "- File: \`$APK\`" >> $GITHUB_STEP_SUMMARY
            echo "- Size: $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "- Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **APK build failed.** Check the buildozer log artifact." >> $GITHUB_STEP_SUMMARY
          fi
